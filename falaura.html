
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Falaura Yönlendirme</title>

  <!-- Instagram & sosyal preview -->
  <meta property="og:title" content="Falaura - Fal Uygulaması">
  <meta property="og:description" content="Hemen indir ve falına bak!">
  <meta property="og:image" content="https://tyosis.com.tr/falaura-cover.jpg">

  <script>
    function redirect() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      if (/android/i.test(ua)) {
        window.location.replace("https://play.google.com/store/apps/details?id=com.tyosis.falaura");
      } else if (/iPad|iPhone|iPod/.test(ua)) {
        window.location.replace("https://apps.apple.com/app/idXXXXXXXX"); // iOS gelince
      } else {
        window.location.replace("https://tyosis.com.tr"); // fallback
      }
    }

    setTimeout(redirect, 300); // küçük delay → Instagram bug fix
  </script>
</head>
<body style="font-family:sans-serif;text-align:center;padding-top:40px;">
  <h2>Yönlendiriliyorsunuz...</h2>
  <p>Eğer otomatik yönlenmezse aşağıya tıklayın:</p>

  <a href="https://play.google.com/store/apps/details?id=com.tyosis.falaura">
    Play Store'a Git
  </a>
</body>
</html>
